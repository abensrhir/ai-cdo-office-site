<section class="cta" aria-labelledby="cta-heading">
  <div class="container">
    <h2 id="cta-heading">Meet Your New Team</h2>
    <p class="cta-sub">Open-source. MIT licensed. Install in 10 seconds.</p>
    <div class="hero-install">
      <code class="install-command">claude plugin install ai-cdo-office</code>
      <button class="copy-btn" data-copy="claude plugin install ai-cdo-office" aria-label="Copy install command">Copy</button>
    </div>
    <div class="hero-actions">
      <a href="{{ site.Params.repoURL }}" class="btn btn-secondary" target="_blank" rel="noopener noreferrer">View on GitHub &nearr;</a>
      <a href="{{ "/team/" | relURL }}" class="btn btn-outline">Meet the Team</a>
    </div>
  </div>
</section>
