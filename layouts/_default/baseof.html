<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ block "title" . }}{{ with .Title }}{{ . }} | {{ end }}{{ site.Title }}{{ end }}</title>
  {{ partial "head.html" . }}
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  {{ partial "nav.html" . }}
  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <!-- Terminal player (loaded globally — only runs if .terminal-player elements exist) -->
  {{ with resources.Get "js/terminal-player.js" }}
    {{ if hugo.IsDevelopment }}
      <script src="{{ .RelPermalink }}" defer></script>
    {{ else }}
      {{ with . | minify | fingerprint }}
        <script src="{{ .RelPermalink }}" integrity="{{ .Data.Integrity }}" defer></script>
      {{ end }}
    {{ end }}
  {{ end }}
  <!-- Shared copy button handler -->
  <script>
    document.querySelectorAll('[data-copy]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var text = this.dataset.copy;
        var el = this;
        navigator.clipboard.writeText(text).then(function() {
          el.textContent = 'Copied!';
          el.classList.add('copied');
          setTimeout(function() {
            el.textContent = 'Copy';
            el.classList.remove('copied');
          }, 2000);
        });
      });
    });
  </script>
</body>
</html>
